# ------------------------------------------------------------------------------
# 1. GENERAL SETTINGS
# ------------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g mouse on
set -g history-limit 50000
set -g display-time 2000            # Status messages stay for 2s
set -g status-interval 5            # Update status bar every 5s
set -g focus-events on              # Focus events enabled for terminals that support them
set -sg escape-time 0               # Fixes sluggishness in Vim

# Window/Pane numbering
set -g base-index 1                 # Start numbering at 1
setw -g pane-base-index 1
set -g renumber-windows on          # Automatically renumber windows when one is closed

# ------------------------------------------------------------------------------
# 2. KEYBINDINGS
# ------------------------------------------------------------------------------
# Prefix change
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Improved Splits (Open in current path)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# Pane Navigation (Vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane Resizing (Repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Cycle windows
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ------------------------------------------------------------------------------
# 3. COPY MODE (VI STYLE)
# ------------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# macOS clipboard
if-shell "uname | grep -q Darwin" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}

# Linux clipboard (handles X11 and Wayland)
if-shell "uname | grep -q Linux" {
  if-shell "command -v xclip >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
  }
  if-shell "command -v wl-copy >/dev/null 2>&1" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
  }
}

# ------------------------------------------------------------------------------
# 4. LOOK & FEEL (STYLING)
# ------------------------------------------------------------------------------
# Pane borders (Clearer distinction)
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=cyan

# Status Bar
set -g status-position bottom
set -g status-style bg=default,fg=white # 'default' makes status bar transparent

# Left side: Session name
set -g status-left-length 40
set -g status-left "#[fg=green,bold] #S #[fg=white]| "

# Right side: Date, Time, User
set -g status-right-length 80
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=white]| #[fg=cyan]%H:%M #[fg=white]| #[fg=magenta]#{user} "

# Window status
setw -g window-status-format "#[fg=colour244]#I:#W"
setw -g window-status-current-format "#[fg=cyan,bold]#I:#W*"

# Message style
set -g message-style bg=yellow,fg=black,bold
